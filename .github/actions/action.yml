name: "Test Template"
description: "Template for running NeMo tests in a containerized environment"

inputs:
  container-image:
    description: "Container image to use for test"
    required: true
  timeout:
    description: "Max runtime of test in minutes"
    required: false
    default: "30"
  script:
    description: "Test script to execute"
    required: true
  is-optional:
    description: "Pass this job on failure."
    required: false
    default: "false"
  is_unit_test:
    description: "Upload coverage as unit test"
    required: false
    default: "false"
  tag:
    description: Latest or legacy test suite
    required: true
  test_case:
    description: Test case to launch
    required: true
  model:
    description: Model to launch
    required: false
  PAT:
    description: "GitHub Personal Access Token"
    required: true
  scope:
    description: "Test scope (e.g. mr-github, mr-github-slim)"
    required: false
    default: "mr-github-slim"
  n_repeat:
    description: "Number of test repetitions"
    required: false
    default: "5"
  lightweight:
    description: "Enable lightweight mode"
    required: false
    default: "false"
  platform:
    description: "Platform to run tests on (e.g. dgx_h100, dgx_gb200)"
    required: false
    default: "dgx_h100"
runs:
  using: "composite"
  steps:
    - name: Print node name
      shell: bash -x -e -u -o pipefail {0}
      run: echo "node_name=$NODE_NAME" | tee -a "$GITHUB_OUTPUT"

    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Change ownership of /home/runner/
      shell: bash
      run: sudo chown -R $(whoami) /home/runner/

    - name: Setup python and install dependencies
      shell: bash -x -e -u -o pipefail {0}
      run: |
        for i in 1 2 3; do
          apt-get update && break
          echo "apt-get update failed (attempt $i/3), retrying in 10s..."
          sleep 10
        done
        apt-get install -y python3.12 python3.12-venv uuid-runtime
        curl -LsSf https://astral.sh/uv/install.sh | UV_INSTALL_DIR=/usr/local/bin sh

    - name: Create run-script (unit test)
      shell: bash -x -e -u -o pipefail {0}
      if: inputs.is_unit_test == 'true'
      run: |
        echo "::group::Create run-script"
        cmd=$(cat <<'RUN_TEST_EOF'
        #!/bin/bash

        export PYTHONPATH=$(pwd)
        export NEMORUN_HOME=$(pwd)
        export NCCL_DEBUG=INFO
        uv venv .venv
        uv cache clean
        uv sync --no-cache --only-group test
        uv run python tests/test_utils/python_scripts/launch_nemo_run_workload.py \
          --scope unit-tests \
          --model unit-tests \
          --test-case "${{ inputs.test_case }}" \
          --environment dev \
          --platform ${{ inputs.platform }} \
          --tag ${{ inputs.tag }} \
          --container-image ${{ inputs.container-image }} \
          --hf-home /mnt/datadrive/TestData/nemo-fw/TestData/HF_HOME

        RUN_TEST_EOF
        )
        echo "$cmd" | tee "job.sh"
        echo "::endgroup::"

    - name: Create run-script (e2e test)
      shell: bash -x -e -u -o pipefail {0}
      if: inputs.is_unit_test == 'false'
      env:
        MODEL: ${{ inputs.model }}
      run: |
        echo "::group::Create run-script"
        cmd=$(cat <<'RUN_TEST_EOF'
        #!/bin/bash
        set -euxo pipefail

        ARGS=(
          --scope ${{ inputs.scope }}
          --n-repeat ${{ inputs.n_repeat }}
        )
        if [ "${{ inputs.lightweight }}" == "true" ]; then
          ARGS+=(--enable-lightweight-mode)
        fi

        export PYTHONPATH=$(pwd)
        export NEMORUN_HOME=$(pwd)
        uv venv .venv
        uv cache clean
        uv sync --no-cache --only-group test
        uv run python tests/test_utils/python_scripts/launch_nemo_run_workload.py \
          ${ARGS[@]} \
          --model ${{ inputs.model }} \
          --test-case ${{ inputs.test_case }} \
          --environment dev \
          --platform ${{ inputs.platform }} \
          --container-image ${{ inputs.container-image }} \
          --data-dir /mnt/datadrive/TestData/megatron-lm/artifacts \
          --hf-home /mnt/datadrive/TestData/nemo-fw/TestData/HF_HOME

        RUN_TEST_EOF
        )
        echo "$cmd" | tee "job.sh"
        echo "::endgroup::"

    - name: Set timeout
      shell: bash -x -e -u -o pipefail {0}
      id: timeout_in_seconds
      run: |
        echo "::group::Set timeout"
        echo "main=$(( ${{ inputs.timeout }} * 60 ))" | tee -a "$GITHUB_OUTPUT"
        echo "::endgroup::"

    - name: Pull container
      shell: bash -x -e -u -o pipefail {0}
      run: |
        echo "::group::Pull container"
        docker pull ${{ inputs.container-image }}
        echo "::endgroup::"

    - name: Run main script
      shell: bash -x -e -u -o pipefail {0}
      id: run-main-script
      run: |
        echo "::group::Run main script"
        EXIT_CODE=0
        /bin/bash job.sh || EXIT_CODE=$?
        echo "exit_code=$EXIT_CODE" | tee -a "$GITHUB_OUTPUT"
        echo "::endgroup::"
        exit $EXIT_CODE

    - name: Check result
      id: check
      shell: bash -x -e -u -o pipefail {0}
      if: always()
      env:
        IS_UNIT_TEST: ${{ inputs.is_unit_test == 'true' }}
      run: |
        echo "::group::Collect artifact names"
        logs_report=logs-${{ inputs.test_case }}-${{ github.run_id }}-$(uuidgen)
        echo "logs_report=$logs_report" | sed 's/\//-/g' | sed 's/\*/-/g' | tee -a "$GITHUB_OUTPUT"
        if [[ "$IS_UNIT_TEST" == "true" ]]; then
          coverage_report=coverage-unit-test-${{ github.run_id }}-$(uuidgen)
        else
          coverage_report=none
        fi
        echo "coverage_report=$coverage_report" | tee -a "$GITHUB_OUTPUT"
        echo "::endgroup::"

        EXIT_CODE=${{ steps.run-main-script.outputs.exit_code }}
        IS_SUCCESS=$([[ "$EXIT_CODE" -eq 0 ]] && echo "true" || echo "false")

        if [[ "$IS_SUCCESS" == "false" && "${{ inputs.is-optional }}" == "true" ]]; then
          echo "::warning::Test failed but is marked optional — treating as success."
          IS_SUCCESS=true
        fi

        LOG_BASE=$([[ "$IS_UNIT_TEST" == "true" ]] && echo "assets_dir/logs" || echo "assets_dir")
        LATEST_LOG=""
        if [[ -d "$LOG_BASE" ]]; then
          LATEST_LOG=$(find "$LOG_BASE" -maxdepth 3 -name "*.log" -type f 2>/dev/null \
                         | xargs -r ls -t 2>/dev/null | head -1 || true)
        fi
        if [[ -n "$LATEST_LOG" ]]; then
          echo "━━━ log excerpt: ${LATEST_LOG} (last 40 lines) ━━━"
          tail -40 "$LATEST_LOG"
          echo "━━━ end of excerpt ━━━"
        else
          echo "(no log file found in ${LOG_BASE})"
        fi

        if [[ "$coverage_report" != "none" ]]; then
          echo "::group::Coverage report"
          uv run coverage report -i
          echo "::endgroup::"
        fi

        if [[ "$IS_SUCCESS" == "true" ]]; then
          echo "::notice title=Result::✅ ${{ inputs.test_case }} — PASSED"
          exit 0
        else
          echo "::error title=Result::❌ ${{ inputs.test_case }} — FAILED (exit $EXIT_CODE)"
          exit 1
        fi

    - name: Upload coverage
      uses: actions/upload-artifact@v4
      if: ${{ always() && steps.check.outputs.coverage_report != 'none' }}
      with:
        name: ${{ steps.check.outputs.coverage_report }}
        path: |
          coverage.xml
          .coverage
        include-hidden-files: true

    - name: Upload logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ steps.check.outputs.logs_report }}
        path: ${{ inputs.is_unit_test == 'true' && 'assets_dir/logs' || 'assets_dir' }}
        include-hidden-files: true
