# CUDA Hardware Configuration for Megatron-LM-FL
# This file defines CI/CD settings for CUDA-based testing
# Test configurations are defined in tests/test_utils/config/platforms/cuda.yaml

hardware_name: cuda
display_name: 'CUDA Tests'

# CI image for online env
ci_image: harbor.baai.ac.cn/flagscale/megatron-lm-fl:cuda12.8.1-cudnn9.8.0-torch2.7.0-python3.12-dev-02111650

# Runner labels for A100 node
runner_labels:
  - nv-8g-cicd-megatron

# Container volumes (hardware-specific paths)
# container_volumes:
#   - /home/flagscale_cicd/flask/static:/workspace/report
#   - /home/flagscale_cicd/flask/config:/workspace/config
#   - /home/flagscale_cicd/docker/docker_build/docker_data:/home/gitlab-runner/data
#   # Official functional recipes expect frozen checkpoints and artifacts here.
#   - /home/flagscale_cicd/docker/docker_build/docker_data:/mnt/artifacts
#   - /home/flagscale_cicd/docker/docker_build/docker_tokenizers:/home/gitlab-runner/tokenizers
#   - /home/flagscale_cicd/docker/docker_build/docker_data/Megatron-LM/datasets:/opt/data/datasets
#   - /home/flagscale_cicd/docker/docker_build/docker_tokenizers/Megatron-LM/tokenizers:/opt/data/tokenizers

# Container volumes for online env
container_volumes:
  - /mnt/airs-business/cicd/baai_datasets:/home/gitlab-runner/data
  - /mnt/airs-business/cicd/baai_tokenizers:/home/gitlab-runner/tokenizers

# Container options (hardware-specific settings)
container_options: '--privileged --gpus all --shm-size=500g --hostname megatron_cicd --user root --ulimit nofile=65535:65535'

# Device types to run tests on
device_types:
  - a100

# Test matrix configuration
test_matrix:
  unit:
    devices:
      - a100
    # Ignored test files for unit tests
    # These files will be skipped when running pytest
    ignored_tests:
      - tests/unit_tests/data/test_preprocess_data.py
      - tests/unit_tests/dist_checkpointing/test_global_metadata_reuse.py
      - tests/unit_tests/dist_checkpointing/test_optimizer.py
      - tests/unit_tests/dist_checkpointing/test_nonpersistent.py
      - tests/unit_tests/dist_checkpointing/test_optimizer.py
      - tests/unit_tests/dist_checkpointing/test_safe_globals.py
      - tests/unit_tests/dist_checkpointing/models/test_moe_experts.py
      - tests/unit_tests/dist_checkpointing/test_layer_wise_optimizer.py ## sporadic cuda malloc error on CI machines, tests passed locally
      - tests/unit_tests/distributed/test_grad_sync_with_expert_parallel.py
      - tests/unit_tests/distributed/test_param_and_grad_buffer.py ## test_bucket_sizes[True-True-False-18050] FAILED NCCL SIGABRT
      - tests/unit_tests/export/trtllm/test_distributed_fp8.py
      - tests/unit_tests/export/trtllm/test_single_device_fp8.py
      - tests/unit_tests/export/trtllm/test_trtllm_helper.py
      - tests/unit_tests/pipeline_parallel/test_pipeline_layout.py ## sporadic cuda malloc error on CI machines, tests passed locally
      - tests/unit_tests/transformer/moe/test_a2a_token_dispatcher.py
      - tests/unit_tests/transformer/moe/test_token_dispatcher.py ## sporadic cuda malloc error on CI machines, tests passed locally
      - tests/unit_tests/test_inference.py
      - tests/unit_tests/models/test_gpt_model.py
      - tests/unit_tests/models/test_mamba_model.py
      - tests/unit_tests/models/test_mamba_moe_model.py ## sporadic cuda malloc error on CI machines, tests passed locally
      - tests/unit_tests/models/test_mimo_1f1b_schedule.py ## HyperCommGrid + TE attention: TE requires global _TENSOR_MODEL_PARALLEL_GROUP but HyperCommGrid only sets per-grid process groups
      - tests/unit_tests/models/test_mimo_checkpoint.py ## same HyperCommGrid + TE attention issue as test_mimo_1f1b_schedule
      - tests/unit_tests/post_training/test_modelopt_module_spec.py
      - tests/unit_tests/transformer/moe/test_upcycling.py ## tests passed locally but CI hits unhandled NCCL error
      - tests/unit_tests/transformer/moe/test_aux_loss.py
      - tests/unit_tests/transformer/moe/test_moe_layer_discrepancy.py
      - tests/unit_tests/transformer/moe/test_routers.py
      - tests/unit_tests/transformer/test_attention.py
      - tests/unit_tests/transformer/test_attention_packed_seq.py
      - tests/unit_tests/transformer/test_cuda_graphs.py
      - tests/unit_tests/transformer/test_full_cuda_graph.py
      - tests/unit_tests/transformer/test_multi_latent_attention.py
      - tests/unit_tests/transformer/test_multi_token_prediction.py
      - tests/unit_tests/transformer/test_transformer_block.py
      - tests/unit_tests/transformer/test_transformer_block_custom_pgs.py
      - tests/unit_tests/transformer/test_submodule_callables.py ## tests passed locally but CI hits NCCL error
      - tests/unit_tests/transformer/test_thd_correctness.py::test_thd_format[tp2_cp4_sp] ## TE version does not support CP + THD format attention
      - tests/unit_tests/transformer/test_thd_correctness.py::test_thd_format[tp2_cp2_sp_longseq] ## TE version does not support CP + THD format attention
      - tests/unit_tests/transformer/test_thd_correctness.py::test_thd_format[short_seqs_parallel] ## TE version does not support CP + THD format attention
      - tests/unit_tests/transformer/test_thd_correctness.py::test_thd_format[extreme_mixed] ## TE version does not support CP + THD format attention
      - tests/unit_tests/transformer/test_thd_correctness.py::test_thd_format[long_short_mix] ## TE version does not support CP + THD format attention
      - tests/unit_tests/transformer/experimental_attention_variant/test_absorbed_mla.py
      - tests/unit_tests/transformer/experimental_attention_variant/test_attention_variant_dsa.py
      - tests/unit_tests/dist_checkpointing/test_local.py
      - tests/unit_tests/dist_checkpointing/test_serialization.py::TestSerialization::test_remove_sharded_tensors ## NCCL hangs inexplicably during distributed barrier with TP=2 PP=4 on 8 GPUs

      # test_straggler_detector causes a SIGSEGV (Signal 11) crash during pytest session teardown on A100.
      # Root cause: UCX (HPC-X libucs.so) crashes in torch.distributed.barrier() called from the
      # session-scoped cleanup fixture in conftest.py, likely because the distributed process group
      # is in an inconsistent state after the test completes. This is a UCX/NCCL environment issue,
      # not a logic bug. Skipped until the teardown issue is resolved.
      - tests/unit_tests/test_utils.py::test_straggler_detector
      - tests/unit_tests/tokenizers/test_tokenizer.py
      - tests/unit_tests/dist_checkpointing/models/test_bert_model.py::TestBertModel::test_sharded_state_dict_save_load
      - tests/unit_tests/dist_checkpointing/models/test_gpt_model.py::TestGPTModel::test_sharded_state_dict_save_load
      - tests/unit_tests/dist_checkpointing/models/test_t5_model.py::TestT5Model::test_sharded_state_dict_save_load
      - tests/unit_tests/distributed/megatron_fsdp/test_mcore_fully_sharded_data_parallel.py

  functional:
    train:
      - model: gpt
        test_case: qwen3_0p6b_mcore_te_tp1_pp1_no_mmap_bin_files
        training_script: pretrain_gpt.py
        n_repeat: 1
        golden_environment: dev
        golden_platform: dgx_a100
        enable_lightweight_mode: false
      - model: gpt
        test_case: qwen3_0p6b_mcore_te_tp2_pp2_benchmark
        training_script: pretrain_gpt.py
        n_repeat: 1
        golden_environment: dev
        golden_platform: dgx_a100
        enable_lightweight_mode: false
        gpus_per_node: 8
