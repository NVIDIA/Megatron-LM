name: Auto Reminder Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions: {}

jobs:
  # TEMPORARY: API-dispatched PR #3370 canary. The path is registered on the
  # default branch, but this job runs only from NVIDIA's pull-request/4862 ref.
  claude-fix-pr-3370:
    name: Claude Fix PR 3370 Canary
    if: |
      github.repository == 'NVIDIA/Megatron-LM' &&
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/pull-request/4862' &&
      github.actor == 'Phlip79' &&
      github.triggering_actor == 'Phlip79'
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: read
    uses: ./.github/workflows/claude-fix.yml
    with:
      test_mode: true
      test_pr_number: 3370
      test_requester: Phlip79
    secrets:
      NVIDIA_INFERENCE_URL: ${{ secrets.NVIDIA_INFERENCE_URL }}
      NVIDIA_INFERENCE_KEY: ${{ secrets.NVIDIA_INFERENCE_KEY }}
      PAT: ${{ secrets.PAT }}

  run-script:
    name: Run Auto Reminder Bot
    runs-on: ubuntu-latest
    if: |
      github.repository == 'NVIDIA/Megatron-LM' &&
      !(github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/pull-request/4862')
    permissions:
      contents: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir PyGithub slack-sdk

      - name: Run Auto Reminder Bot
        run: |
          export SLACK_TOKEN=${{ secrets.SLACK_BOT_TOKEN }}
          export SLACK_WEBHOOK_URL=${{ secrets.SLACK_REVIEW_REMINDER_CHANNEL_WEBHOOK }}
          export GH_TOKEN=${{ secrets.PAT }}
          python tests/test_utils/python_scripts/auto_reminder_github.py
