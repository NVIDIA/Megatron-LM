name: Nightly Sync Main to Dev

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  sync-main-to-dev:
    runs-on: ubuntu-latest
    if: github.repository == 'NVIDIA/Megatron-LM'
    timeout-minutes: 360
    env:
      GH_TOKEN: ${{ secrets.PAT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Configure Git
        run: |
          git config user.name "svcnvidia-nemo-ci"
          git config user.email "svcnvidia-nemo-ci@nvidia.com"

      - name: Compute branch name
        id: vars
        run: |
          DATE=$(date -u +%d_%m_%Y)
          BRANCH="main2dev/${DATE}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Close previous unmerged sync PRs
        run: |
          OPEN_PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --base dev \
            --state open \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("main2dev/")) | .number')

          for PR_NUM in $OPEN_PRS; do
            echo "Closing stale sync PR #${PR_NUM}"
            gh pr close "$PR_NUM" \
              --repo "${{ github.repository }}" \
              --comment "Superseded by today's nightly sync."
          done

      - name: Check if sync is needed
        id: check-sync
        run: |
          git fetch origin main dev
          AHEAD_COUNT=$(git rev-list --count origin/dev..origin/main)
          echo "main is $AHEAD_COUNT commit(s) ahead of dev"
          if [ "$AHEAD_COUNT" -eq 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No changes to sync."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code to merge, fix, and iterate
        if: steps.check-sync.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.PAT }}
          trigger_phrase: ""
          direct_prompt: |
            You are an automated sync bot. Your job is to merge `main` into `dev`, create a PR,
            ensure all CI tests pass (fixing any failures), and mark the PR as ready for review.

            REPO: ${{ github.repository }}
            BRANCH: ${{ steps.vars.outputs.branch }}
            DATE: ${{ steps.vars.outputs.date }}

            ## Step 1: Create the sync branch and merge

            1. Create a new branch from `origin/dev`:
               ```
               git checkout -b $BRANCH origin/dev
               ```

            2. Merge `origin/main` into it, prioritizing main on all conflicts:
               ```
               git merge origin/main -X theirs --no-edit
               ```

            3. If the merge still has unresolved conflicts (exit code 1), resolve them
               by reading each conflicted file, understanding both sides, and choosing
               main's version. Stage and commit the resolution:
               ```
               git diff --name-only --diff-filter=U  # list conflicted files
               # For each file: read it, resolve conflict markers favoring main, edit it
               git add <resolved files>
               git commit --no-edit
               ```

            4. After the merge, take main's version for ALL files that exist in both
               branches. This prevents semantic conflicts where auto-merged dev code
               references APIs that main renamed or removed:
               ```
               git diff --name-only origin/main...HEAD | while read -r f; do
                 if git cat-file -e "origin/main:$f" 2>/dev/null; then
                   git checkout origin/main -- "$f" 2>/dev/null || true
                 fi
               done
               ```

            5. Restore files that exist in main but were deleted/renamed in dev:
               ```
               comm -23 \
                 <(git ls-tree -r --name-only origin/main | sort) \
                 <(git ls-tree -r --name-only HEAD | sort) \
               | while read -r f; do
                 git checkout origin/main -- "$f" 2>/dev/null || true
               done
               ```

            6. Run `black` (version 24) on all changed Python files to fix formatting:
               ```
               pip install 'black==24.*' --quiet
               CHANGED=$(git diff --name-only origin/dev...HEAD -- '*.py' | tr '\n' ' ')
               black --config pyproject.toml $CHANGED
               ```

            7. Stage everything, commit, and push:
               ```
               git add -A
               git commit -m "chore: nightly sync main into dev ($DATE)" --allow-empty
               git push origin $BRANCH --force
               ```

            ## Step 2: Create the PR

            Create a draft PR targeting `dev`:
            ```
            gh pr create \
              --repo $REPO \
              --base dev \
              --head $BRANCH \
              --draft \
              --title "chore: nightly sync main into dev ($DATE)" \
              --body "Automated nightly sync of main into dev. Conflicts resolved by prioritizing main."
            ```

            Save the PR number for later use.

            ## Step 3: Trigger CI and iterate until all tests pass

            This is a loop. Repeat the following until CI passes:

            1. Get the latest commit SHA:
               ```
               SHA=$(git rev-parse HEAD)
               ```

            2. Trigger CI by commenting on the PR:
               ```
               gh pr comment <PR_NUMBER> --repo $REPO --body "/ok to test $SHA"
               ```

            3. Wait for the CI run to appear and complete. Poll every 5 minutes:
               ```
               # Find the CICD run for this branch
               sleep 60  # initial wait for run to appear
               while true; do
                 RUN_JSON=$(gh api "repos/$REPO/actions/runs?per_page=5&branch=pull-request/<PR_NUMBER>" \
                   --jq '[.workflow_runs[] | select(.name == "CICD Megatron-LM")] | .[0]')
                 STATUS=$(echo "$RUN_JSON" | jq -r '.status')
                 CONCLUSION=$(echo "$RUN_JSON" | jq -r '.conclusion')
                 RUN_ID=$(echo "$RUN_JSON" | jq -r '.id')
                 if [ "$STATUS" = "completed" ]; then
                   break
                 fi
                 echo "CI status: $STATUS. Waiting 5 minutes..."
                 sleep 300
               done
               ```

            4. If CI passed (conclusion == "success"), go to Step 4.

            5. If CI failed, investigate and fix:
               a. Get the list of failed jobs:
                  ```
                  gh run view $RUN_ID --repo $REPO 2>&1 | grep -E '^\s*X ' | head -20
                  ```

               b. For each failed job, get its logs:
                  ```
                  gh api repos/$REPO/actions/jobs/<JOB_ID>/logs 2>&1 | grep -E "Error|ImportError|ModuleNotFound|Traceback|cannot import|FAILED|would reformat|line-too-long" | head -30
                  ```

               c. Read the error messages and fix the code. Common issues:
                  - **ImportError / ModuleNotFoundError**: A file references a module that
                    was renamed or deleted. Check if the module exists, find the correct
                    name, and fix the import.
                  - **black formatting**: Run `black --config pyproject.toml` on the files.
                  - **pylint line-too-long**: Wrap long lines to stay under 100 chars.
                  - **pylint missing-docstring**: Add one-line docstrings to methods.
                  - **Test failures**: Read the test output carefully, understand what
                    assertion failed, and fix the underlying code.

               d. After fixing, commit and push:
                  ```
                  git add -A
                  git commit -m "fix: address CI failure"
                  git push origin $BRANCH --force
                  ```

               e. Go back to step 3.1 to re-trigger CI.

            ## Step 4: Mark PR as ready for review

            Once CI passes:
            ```
            gh pr ready <PR_NUMBER> --repo $REPO
            gh pr comment <PR_NUMBER> --repo $REPO \
              --body "All CI checks passed. This PR is ready for human review and merge."
            ```

            ## Important notes

            - NEVER give up. Keep fixing and retrying until CI passes.
            - Always prioritize main's code over dev's when resolving issues.
            - Use `secrets.PAT` (already set as GH_TOKEN) for all GitHub operations.
            - The CI pipeline triggers when you comment "/ok to test <sha>" on the PR.
            - CI runs on `pull-request/<PR_NUMBER>` branches — use that pattern when querying.
            - The git committer identity is svcnvidia-nemo-ci.
          claude_args: |
            --allowedTools "Bash,Read,Edit,Write,Grep,Glob"
            --model "claude-opus-4-6"
