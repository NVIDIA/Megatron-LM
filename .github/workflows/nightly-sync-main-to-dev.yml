name: Nightly Sync Main to Dev

on:
  workflow_dispatch:

concurrency:
  group: nightly-sync-main-to-dev
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  sync-main-to-dev:
    runs-on: ubuntu-latest
    if: github.repository == 'NVIDIA/Megatron-LM'
    timeout-minutes: 360
    env:
      GH_TOKEN: ${{ secrets.PAT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Configure Git
        run: |
          git config user.name "svcnvidia-nemo-ci"
          git config user.email "svcnvidia-nemo-ci@nvidia.com"

      - name: Compute branch name
        id: vars
        run: |
          DATE=$(date -u +%d_%m_%Y)
          BRANCH="main2dev/${DATE}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Close previous unmerged sync PRs
        run: |
          OPEN_PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --base dev \
            --state open \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("main2dev/")) | .number')

          for PR_NUM in $OPEN_PRS; do
            echo "Closing stale sync PR #${PR_NUM}"
            gh pr close "$PR_NUM" \
              --repo "${{ github.repository }}" \
              --comment "Superseded by today's nightly sync."
          done

      - name: Check if sync is needed
        id: check-sync
        run: |
          git fetch origin main dev
          AHEAD_COUNT=$(git rev-list --count origin/dev..origin/main)
          echo "main is $AHEAD_COUNT commit(s) ahead of dev"
          if [ "$AHEAD_COUNT" -eq 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No changes to sync."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code to merge, fix, and iterate
        if: steps.check-sync.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.PAT }}
          prompt: |
            You are an automated sync bot. Your job is to merge `main` into `dev`,
            create a PR, ensure all CI tests pass (fixing any failures), and mark
            the PR as ready for review.

            REPO: ${{ github.repository }}
            BRANCH: ${{ steps.vars.outputs.branch }}
            DATE: ${{ steps.vars.outputs.date }}

            Read `.claude/skills/build-and-test/SKILL.md` and `CLAUDE.md` first to
            understand the project's CI pipeline, testing infrastructure, and
            contribution guidelines.

            ---

            ## Phase 1: Create the sync branch and merge

            Create a branch named `$BRANCH` from `origin/dev` and merge
            `origin/main` into it.

            **Merge strategy:**
            - Use `git merge origin/main -X theirs --no-edit` so that main wins on
              textual conflicts.
            - If any conflicts remain unresolved (e.g. add/add), read each
              conflicted file, understand both sides, and resolve by favoring main.
            - **Do NOT blanket-override all shared files with main's version.**
              Dev has features that are not yet in main (new classes, new modules,
              new tests). The git merge preserves both sides' non-conflicting
              additions, which is correct. Only intervene where there is an actual
              conflict.

            **After merging, take main's version ONLY for these specific files**
            that are known to have semantic conflicts (dev's versions reference
            args/APIs that main removed or renamed):
            - `pyproject.toml` and `uv.lock` (lock-file consistency for container build)
            - `docker/Dockerfile.ci.dev` (build compatibility)
            - `megatron/training/training.py` (references dev-only args)
            - `megatron/training/initialize.py` (references dev-only args)
            - `megatron/training/utils.py` (references dev-only args)
            - `megatron/training/datasets/data_samplers.py` (references dev-only args)
            - `megatron/core/optimizer/layer_wise_optimizer.py` (constructor signature)

            Use: `git checkout origin/main -- <file>` for each.

            **Special handling for `megatron/core/datasets/data_schedule.py`:**
            Main and dev have completely different classes in this file. Main has
            `HybridCPDataLoaderWrapper` (imported by main's `training.py`). Dev
            has `BasePackingScheduler`, `DpBalancedScheduler`,
            `DefaultDynamicCPScheduler`, `wrap_data_iterator`, and
            `get_batch_on_this_rank_for_sequence_packing` (imported by
            `pretrain_gpt.py` and `tests/unit_tests/test_sequence_packing.py`).
            **Do NOT take either version wholesale.** Instead, keep dev's file
            and append main's `HybridCPDataLoaderWrapper` class (plus any
            missing imports like `BalancedCPScheduler`, `Any`, `List`) at the
            end. Then run `black` and `isort` on the result.

            **Restore files that exist in main but were deleted/renamed in dev:**
            Compare `git ls-tree` between `origin/main` and HEAD, and restore any
            files from main that are missing (e.g. `hybrid_cp_schedule.py`).

            Run `black` (version 24, with `--config pyproject.toml`) on **all**
            changed Python files (relative to `origin/dev`) to fix formatting.
            Then run `isort` on the same set of files. Order matters: black
            first, then isort — running them in the wrong order can undo
            isort's work.

            **After formatting, run pylint on all changed `megatron/core/` files**
            to catch missing-docstring and line-too-long violations before
            pushing. Fix any violations found — e.g. the merge often introduces
            pylint issues in `megatron/core/optimizer/grad_scaler.py` (missing
            docstrings on abstract methods, long lines in docstrings).

            Commit everything and push the branch.

            ---

            ## Phase 2: Create the PR

            Create a **draft** PR targeting `dev`:
            - Title: `chore: nightly sync main into dev ($DATE)`
            - Body: describe what was synced, how conflicts were resolved, and
              that CI will be iterated on automatically.

            Save the PR number.

            ---

            ## Phase 3: Trigger CI and iterate until all tests pass

            **Important CI architecture notes:**
            - `Nemo_CICD_Test` is a downstream **gate job** that aggregates
              results from unit tests, integration tests, and other jobs. If
              it fails, investigate the upstream jobs it depends on — do NOT
              debug `Nemo_CICD_Test` itself.
            - Integration tests (H100, GB200) may be skipped for non-maintainer
              PRs. This is expected; the `Nemo_CICD_Test` gate will fail as a
              result, but that is not a sync issue.
            - `tests/unit_tests/conftest.py` imports from
              `megatron.training.training`, so a single broken import in
              `training.py` (or anything it transitively imports) will cascade
              and fail **ALL** test suites. If you see every test job failing
              with an `ImportError`, check the import chain from `training.py`
              first.

            Loop:
            1. Get the HEAD commit SHA and comment on the PR:
               `/ok to test <SHA>`
            2. Find the CI run: use `gh run list` with `--json` and filter
               for `headBranch == "pull-request/<PR_NUMBER>"` (note: `gh run
               list` does not support a `--branch` flag). Wait for the `CICD
               Megatron-LM` workflow run to complete. Poll the GitHub API
               every 2 minutes, checking for individual job failures as they
               happen (don't wait for the entire run to finish). Use:
               `gh api repos/$REPO/actions/runs/<RUN_ID>/jobs?per_page=100`
               and check for jobs with `conclusion == "failure"`.
            3. If the run **succeeded** → go to Phase 4.
            4. If any job **failed** → investigate and fix immediately:
               - Fetch the failed job's logs via
                 `gh api repos/$REPO/actions/jobs/<JOB_ID>/logs`.
               - Grep for `ImportError`, `ModuleNotFoundError`, `FAILED`,
                 `would reformat`, `line-too-long`, `Traceback`, etc.
               - Read the error, understand the root cause, and fix the code.
               - Common issues from this sync:
                 - **ImportError for a class/module**: A dev-only test imports a
                   class from a shared file where we took main's version. Fix by
                   checking whether the class was moved, renamed, or needs to be
                   kept from dev's version of that file. Be surgical — restore only
                   the missing class/function, not the entire file. If a file's
                   classes are completely different between main and dev (like
                   `data_schedule.py`), take main's version entirely and note it
                   as a new override candidate for Phase 1.
                 - **black / pylint formatting**: Run `black --config pyproject.toml`
                   on the offending files. For pylint long-line or
                   missing-docstring, edit the file directly.
                 - **Test assertion failures**: Read the test and the code under
                   test. Fix the code or the test as appropriate.
               - Commit fixes, push, and re-trigger CI.
               - Repeat until all fixable issues are resolved.

            **Handling pre-existing failures:**
            If a test failure is NOT caused by the sync (i.e. the same test code
            and function signatures exist identically on `dev` or `main` and the
            failure would reproduce there too), do NOT attempt to fix it. Instead:
            1. Verify it is pre-existing by comparing the test file and the code
               it calls between `origin/main`, `origin/dev`, and your branch.
            2. Note the failure as pre-existing and move on.
            3. After the CI run completes, update the PR description with a
               section titled "Pre-existing test failures (NOT caused by this
               sync)" documenting each such failure: the test name, the error
               message, and the evidence that it is pre-existing.
            4. Also comment on the PR summarizing these pre-existing failures so
               reviewers are aware.

            ---

            ## Phase 4: Mark PR as ready for review

            Once all sync-related CI issues are fixed (pre-existing failures
            are acceptable):
            ```
            gh pr ready <PR_NUMBER> --repo $REPO
            ```
            Comment on the PR confirming which checks passed, listing any
            pre-existing failures that remain, and stating it is ready for
            human review.

            ---

            ## Rules

            - **Prioritize main over dev** when there is a genuine conflict between
              the two. But preserve dev-only additions (new files, new classes, new
              tests) that do not conflict with main.
            - Keep fixing and retrying sync-related issues until they pass.
              For pre-existing failures, document them and move on (see Phase 3).
            - The CI pipeline triggers when you comment "/ok to test <sha>".
            - CI runs appear on the `pull-request/<PR_NUMBER>` branch.
            - The git committer identity is `svcnvidia-nemo-ci`.
            - After editing imports, run `isort` on those files.
          claude_args: |
            --allowedTools "Bash,Read,Edit,Write,Grep,Glob,Agent"
            --model "claude-opus-4-6"
            --max-turns 200
