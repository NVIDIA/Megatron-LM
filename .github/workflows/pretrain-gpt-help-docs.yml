name: Pretrain GPT help docs

on:
  push:
    branches:
      - dev
      - main
      - "pull-request/[0-9]+"
      - "deploy-release/*"
    paths:
      - ".github/workflows/pretrain-gpt-help-docs.yml"
      - "docs/pretrain_gpt_help.txt"
      - "pretrain_gpt.py"
      - "gpt_builders.py"
      - "model_provider.py"
      - "megatron/post_training/**"
      - "megatron/training/argument_utils.py"
      - "megatron/training/arguments.py"
      - "megatron/training/config/**"
      - "megatron/core/distributed/distributed_data_parallel_config.py"
      - "megatron/core/optimizer/optimizer_config.py"
      - "megatron/core/transformer/transformer_config.py"
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

jobs:
  generate-pretrain-gpt-help:
    if: github.repository == 'NVIDIA/Megatron-LM'
    runs-on: linux-amd64-cpu16
    container:
      image: nvcr.io/nvidia/pytorch:25.05-py3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set PATH
        run: |
          echo "UV_PROJECT_ENVIRONMENT=/opt/venv" | tee -a "$GITHUB_ENV"
          echo "VIRTUAL_ENV=/opt/venv" | tee -a "$GITHUB_ENV"
          echo "UV_LINK_MODE=copy" | tee -a "$GITHUB_ENV"
          echo "CUDA_HOME=/usr/local/cuda" | tee -a "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH" | tee -a "$GITHUB_ENV"
          echo "PATH=$HOME/.local/bin:$PATH:$CUDA_HOME/bin" | tee -a "$GITHUB_ENV"
          echo "CUDACXX=/usr/local/cuda/bin/nvcc" | tee -a "$GITHUB_ENV"
          echo "TORCH_CUDA_ARCH_LIST=6.0;6.1;7.0;7.5;8.0;8.6;9.0" | tee -a "$GITHUB_ENV"

      - name: Install project
        shell: bash
        run: bash docker/common/install.sh --environment dev --base-image pytorch --use-uv

      - name: Generate pretrain_gpt.py help
        shell: bash -x -e -u -o pipefail {0}
        run: |
          mkdir -p docs
          "${UV_PROJECT_ENVIRONMENT}/bin/python" pretrain_gpt.py --help > docs/pretrain_gpt_help.txt

      - name: Upload generated help
        uses: actions/upload-artifact@v6
        with:
          name: pretrain-gpt-help
          path: docs/pretrain_gpt_help.txt

      - name: Check committed help is current
        shell: bash -x -e -u -o pipefail {0}
        run: |
          if ! git ls-files --error-unmatch docs/pretrain_gpt_help.txt >/dev/null 2>&1; then
            echo "::notice file=docs/pretrain_gpt_help.txt::Generated docs/pretrain_gpt_help.txt is available as the pretrain-gpt-help artifact. Commit it to enable stale-file checks."
            exit 0
          fi

          if ! git diff --exit-code -- docs/pretrain_gpt_help.txt; then
            echo "::error file=docs/pretrain_gpt_help.txt::pretrain_gpt.py help output is stale. Regenerate docs/pretrain_gpt_help.txt inside the dev container and commit it."
            exit 1
          fi
