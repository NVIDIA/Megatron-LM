name: "Release Megatron-Core"

on:
  workflow_dispatch:
    inputs:
      release-ref:
        description: Ref (SHA or branch name) to release
        required: true
        type: string
      dry-run:
        description: Do not publish a wheel and GitHub release.
        required: true
        default: true
        type: boolean
      create-gh-release:
        description: Create a GitHub release
        required: true
        default: true
        type: boolean
      generate-changelog:
        description: Generate changelog
        required: false
        default: true
        type: boolean
      publish-docs:
        description: Publish docs
        required: false
        default: true
        type: boolean
      version-bump-branch:
        description: Branch for version bump
        required: true
        type: string
      gh-release-from-tag:
        description: Tag of previous release for changelog builder
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

jobs:
  bump:
    uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_release_bump.yml@cd92468874e9df2a8156d8927a661c5931a3a11f
    with:
      release-ref: ${{ inputs.release-ref || github.sha }}
      dry-run: ${{ inputs.dry-run || false }}
      version-bump-branch: ${{ inputs.version-bump-branch || github.ref_name }}
      restrict-to-admins: true
      app-id: ${{ vars.BOT_ID }}
      library-name: Megatron Core
      bump-targets: |
        [
          {"python-package": "megatron.core", "src-dir": ""},
          {"python-package": "megatron_fsdp", "src-dir": "megatron/core/distributed/fsdp/src/"}
        ]
    secrets:
      BOT_KEY: ${{ secrets.BOT_KEY }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      SSH_PWD: ${{ secrets.SSH_PWD }}

  build-test-publish-wheels:
    needs: [bump]
    if: |
      (
        success() || !failure()
      )
      && !cancelled()
    uses: ./.github/workflows/_build_test_publish_wheel.yml
    with:
      ref: ${{ inputs.release-ref || github.sha }}
      dry-run: ${{ inputs.dry-run || false }}
      no-publish: ${{ inputs.dry-run || false }}
    secrets:
      TWINE_PASSWORD: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/r')) && secrets.SVC_PYPI_TOKEN || secrets.SVC_PYPI_TEST_TOKEN }}

  finalize:
    needs: [bump, build-test-publish-wheels]
    if: |
      (
        success() || !failure()
      )
      && !cancelled()
    uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_release_finalize.yml@cd92468874e9df2a8156d8927a661c5931a3a11f
    with:
      release-ref: ${{ inputs.release-ref || github.sha }}
      release-version: ${{ needs.bump.outputs.release-version }}
      library-name: Megatron Core
      pypi-name: megatron-core
      dry-run: ${{ inputs.dry-run || false }}
      create-gh-release: ${{ inputs.create-gh-release || true }}
      gh-release-tag-prefix: core_
      gh-release-use-changelog-builder: ${{ inputs.generate-changelog }}
      gh-release-from-tag: ${{ inputs.gh-release-from-tag }}
      publish-docs: false
    secrets:
      PAT: ${{ secrets.PAT }}
      SLACK_WEBHOOK: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/r')) && secrets.SLACK_MAIN_CHANNEL_WEBHOOK || secrets.SLACK_CI_CHANNEL_WEBHOOK }}

  publish-docs:
    needs: [bump, finalize]
    if: |
      (
        success() || !failure()
      )
      && inputs.publish-docs == true
      && !cancelled()
    uses: ./.github/workflows/release-docs.yml
    with:
      dry-run: ${{ inputs.dry-run }}
      publish-as-latest: true
      docs-version-override: ${{ needs.bump.outputs.release-version }}
      build-docs-ref: ${{ inputs.release-ref || github.sha }}
    secrets: inherit
