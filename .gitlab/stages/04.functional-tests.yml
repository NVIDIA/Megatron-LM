.functional_tests_rules:
  stage: functional_tests
  rules:
    - if: $BUILD == "no"
      when: never
    - if: $FUNCTIONAL_TEST == "yes"
      when: on_success
    - when: never
default:
  id_tokens:
    VAULT_JWT_TOKEN:
      aud: https://stg.vault.nvidia.com

include:
  - project: dl/jet/gitlab-templates
    ref: main
    file: downstreams.yml

functional:configure:
  needs:
    - test:build_image
    - test:build_nemo_image
    - job: test:unit_tests_pyt(DEV)_mcore(latest)
      optional: true
    - job: test:unit_tests_pyt(LTS)_mcore(latest)
      optional: true
    - job: integration:run_lts_dgx_a100
      optional: true
    - job: integration:run_dev_dgx_a100
      optional: true
    - job: integration:run_lts_dgx_h100
      optional: true
    - job: integration:run_dev_dgx_h100
      optional: true
  extends: [.functional_tests_rules]
  image: ${UTILITY_IMAGE}:${CI_PIPELINE_ID}
  tags:
    - arch/amd64
    - env/prod
    - origin/jet-fleet
    - owner/jet-core
    - purpose/utility
    - team/megatron
  before_script:
    - git rm -r tests/test_utils/local_recipes || true
    - git submodule add --force https://gitlab-ci-token:${CI_JOB_TOKEN}@${GITLAB_ENDPOINT}/ADLR/megatron-lm-convergence-tests.git tests/test_utils/local_recipes
    - ls tests/test_utils/local_recipes
  script:
    - set -x
    - |
      A100_CLUSTER=$([[ "$CLUSTER_A100" != "" ]] && echo $CLUSTER_A100 || echo $DEFAULT_A100_CLUSTER)
      H100_CLUSTER=$([[ "$CLUSTER_H100" != "" ]] && echo $CLUSTER_H100 || echo $DEFAULT_H100_CLUSTER)
      GB200_CLUSTER=$([[ "$CLUSTER_GB200" != "" ]] && echo $CLUSTER_GB200 || echo $DEFAULT_GB200_CLUSTER)
    - |
      RECORD_CHECKPOINTS=$([[ "$CI_MERGE_REQUEST_LABELS" == *"Record checkpoints"* || "$FUNCTIONAL_TEST_RECORD_CHECKPOINTS" == "yes" ]] && echo "true" || echo "false")
    - |
      if [[ "$FUNCTIONAL_TEST_SCOPE" == "release" || "$FUNCTIONAL_TEST_SCOPE" == "weekly" ]]; then
        FUNCTIONAL_TEST_NAME=$(eval echo $FUNCTIONAL_TEST_NAME)
        RELEASE_ARGS=(
          "--run-name"
          $FUNCTIONAL_TEST_NAME
          "--wandb-experiment"
          $(echo $FUNCTIONAL_TEST_NAME | tr '/' '-')
        )
      else
        RELEASE_ARGS=()
      fi
    - |
      WORKLOAD_IMAGE_ARGS=()
      if [[ -n "${FUNCTIONAL_TEST_WORKLOAD_LOCAL_IMAGE_PATH:-}" ]]; then
        WORKLOAD_IMAGE_ARGS+=("--workload-local-image-path ${FUNCTIONAL_TEST_WORKLOAD_LOCAL_IMAGE_PATH}")
      fi
    - |
      # NOTE: $FUNCTIONAL_TEST_SCOPE is supplied by external scheduled-pipeline
      # configurations and uses the GitLab-side legacy values: `mr`, `mr-slim`,
      # `nightly`, `weekly`, `unit-tests`, `release`.
      #   - `mr` / `mr-slim` / `unit-tests` / `release` pass through verbatim
      #     and match recipe rows tagged with the same string. They are
      #     intentionally NOT aliased (see LEGACY_SCOPE_ALIASES in
      #     tests/test_utils/python_scripts/recipe_parser.py) so the GitLab
      #     and GitHub matrices stay decoupled.
      #   - `nightly` / `weekly` are aliased to L2 / L3 by the parser and also
      #     inject a default cadence when the recipe has no explicit one.
      ARGS=(
        "--scope $FUNCTIONAL_TEST_SCOPE"
        "--n-repeat $FUNCTIONAL_TEST_REPEAT"
        "--time-limit $FUNCTIONAL_TEST_TIME_LIMIT"
        "--test-cases $FUNCTIONAL_TEST_CASES"
        "--container-image ${UTILITY_IMAGE}"
        "--container-tag ${CI_PIPELINE_ID}"
        "--dependent-job functional:configure"
        "--record-checkpoints ${RECORD_CHECKPOINTS}"
        "--slurm-account ${CI_SLURM_ACCOUNT}"
        "--no-enable-warmup"
      )
      ARGS+=("${WORKLOAD_IMAGE_ARGS[@]}")
    - |
      SMOKE_ARGS=(
        "--scope L0-smoke"
        "--n-repeat 1"
        "--time-limit 540"
        "--enable-lightweight-mode"
        "--test-cases all"
        "--container-image ${UTILITY_IMAGE}"
        "--container-tag ${CI_PIPELINE_ID}"
        "--dependent-job functional:configure"
        "--record-checkpoints false"
        "--slurm-account ${CI_SLURM_ACCOUNT}"
        "--no-enable-warmup"
      )
      SMOKE_ARGS+=("${WORKLOAD_IMAGE_ARGS[@]}")
    - |
      export PYTHONPATH=$(pwd)
      python tests/test_utils/python_scripts/generate_jet_trigger_job.py \
        ${SMOKE_ARGS[@]} \
        --environment dev \
        --platform dgx_h100 \
        --cluster $H100_CLUSTER \
        --output-path "functional-smoke-h100-job.yaml"
    - |
      export PYTHONPATH=$(pwd)
      python tests/test_utils/python_scripts/generate_jet_trigger_job.py \
        ${SMOKE_ARGS[@]} \
        --environment dev \
        --platform dgx_gb200 \
        --cluster $GB200_CLUSTER \
        --output-path "functional-smoke-gb200-job.yaml"
    - |
      export PYTHONPATH=$(pwd)
      python tests/test_utils/python_scripts/generate_jet_trigger_job.py \
        ${ARGS[@]} \
        --environment dev \
        --platform dgx_a100 \
        --cluster $A100_CLUSTER \
        --output-path "functional-test-job-dev-A100.yaml" \
        ${RELEASE_ARGS[@]}
    - |
      export PYTHONPATH=$(pwd)
      python tests/test_utils/python_scripts/generate_jet_trigger_job.py \
        ${ARGS[@]} \
        --environment dev \
        --platform dgx_h100 \
        --cluster $H100_CLUSTER \
        --output-path "functional-test-job-dev-H100.yaml" \
        ${RELEASE_ARGS[@]}
    - |
      export PYTHONPATH=$(pwd)
      python tests/test_utils/python_scripts/generate_jet_trigger_job.py \
        ${ARGS[@]} \
        --environment lts \
        --platform dgx_a100 \
        --cluster $A100_CLUSTER \
        --output-path "functional-test-job-lts-A100.yaml" \
        ${RELEASE_ARGS[@]}
    - |
      export PYTHONPATH=$(pwd)
      python tests/test_utils/python_scripts/generate_jet_trigger_job.py \
        ${ARGS[@]} \
        --environment lts \
        --platform dgx_h100 \
        --cluster $H100_CLUSTER \
        --output-path "functional-test-job-lts-H100.yaml" \
        ${RELEASE_ARGS[@]}
    - |
      export PYTHONPATH=$(pwd)
      python tests/test_utils/python_scripts/generate_jet_trigger_job.py \
        ${ARGS[@]} \
        --environment dev \
        --platform dgx_gb200 \
        --cluster $GB200_CLUSTER \
        --output-path "functional-test-job-dev-GB200.yaml" \
        ${RELEASE_ARGS[@]}
    - |
      export PYTHONPATH=$(pwd)
      python tests/test_utils/python_scripts/generate_jet_trigger_job.py \
        ${ARGS[@]} \
        --environment lts \
        --platform dgx_gb200 \
        --cluster $GB200_CLUSTER \
        --output-path "functional-test-job-lts-GB200.yaml" \
        ${RELEASE_ARGS[@]}
  artifacts:
    paths:
      - functional-smoke-h100-job.yaml
      - functional-smoke-gb200-job.yaml
      - functional-test-job-lts-A100.yaml
      - functional-test-job-lts-H100.yaml
      - functional-test-job-dev-A100.yaml
      - functional-test-job-dev-H100.yaml
      - functional-test-job-lts-GB200.yaml
      - functional-test-job-dev-GB200.yaml
      - tests/test_utils/local_recipes

.functional_run:
  needs:
    - functional:configure
    - test:build_image
  extends: [.functional_tests_rules]
  trigger:
    include:
      - artifact: functional-test-job-$ENVIRONMENT-$CLUSTER.yaml
        job: functional:configure
    strategy: depend
  variables:
    RO_API_TOKEN: $PAT
    CONTAINER_TAG: $CI_PIPELINE_ID
    CI_MCORE_LTS_IMAGE: $CI_MCORE_LTS_IMAGE
    GITLAB_ENDPOINT: $GITLAB_ENDPOINT
    PARENT_PIPELINE_ID: $CI_PIPELINE_ID
    DASHBOARD_ENDPOINT: $DASHBOARD_ENDPOINT
    MCORE_MR_COMMIT: $MCORE_MR_COMMIT
    MCORE_BACKWARDS_COMMIT: $MCORE_BACKWARDS_COMMIT
    CLUSTER: $CLUSTER

  inherit:
    variables: true

.functional_smoke_rules:
  stage: functional_tests
  rules:
    - if: $BUILD == "no"
      when: never
    - if: $FUNCTIONAL_TEST == "yes" && $FUNCTIONAL_TEST_SCOPE =~ /^(mr|nightly|weekly|release)$/
      when: on_success
    - when: never

# Reuses `.functional_run` (needs, trigger strategy, variables, inherit) and
# only overrides what is smoke-specific: the smoke rules, the generated smoke
# artifact, and the fixed H100 cluster. `.functional_smoke_rules` is listed last
# so its rules win over `.functional_run`'s inherited `.functional_tests_rules`.
functional:smoke-h100:
  extends: [.functional_run, .functional_smoke_rules]
  trigger:
    include:
      - artifact: functional-smoke-h100-job.yaml
        job: functional:configure
    strategy: depend
  variables:
    CLUSTER: H100

# GB200 counterpart of functional:smoke-h100. Same lightweight L0-smoke recipe set,
# generated for the dgx_gb200 platform, gating the GB200 functional runs.
functional:smoke-gb200:
  extends: [.functional_run, .functional_smoke_rules]
  trigger:
    include:
      - artifact: functional-smoke-gb200-job.yaml
        job: functional:configure
    strategy: depend
  variables:
    CLUSTER: GB200

# Prune artifacts older than 14 days from the JET assets/artifacts roots on
# each cluster. Gated on release/weekly scope so it does not run on every MR
# pipeline. Functional `run_*` jobs depend on the matching cleanup job via
# `optional: true`, so pipelines without a cleanup job (e.g. `mr` scope) still
# start their workloads immediately.
.functional_cleanup_rules:
  stage: functional_tests
  rules:
    - if: $BUILD == "no"
      when: never
    - if: $FUNCTIONAL_TEST == "yes" && ($FUNCTIONAL_TEST_SCOPE == "release" || $FUNCTIONAL_TEST_SCOPE == "weekly")
      when: on_success
    - when: never

.functional_cleanup:
  needs:
    - functional:configure
    - test:build_image
  extends: [.functional_cleanup_rules]
  image: ${UTILITY_IMAGE}:${CI_PIPELINE_ID}
  tags:
    - arch/amd64
    - env/prod
    - origin/jet-fleet
    - owner/jet-core
    - purpose/utility
    - team/megatron
  timeout: 30m
  allow_failure: true
  script:
    - |
      case "$CLEANUP_PLATFORM" in
        dgx_a100)
          GPU_CLUSTER=$([[ "$CLUSTER_A100" != "" ]] && echo "$CLUSTER_A100" || echo "$DEFAULT_A100_CLUSTER")
          ;;
        dgx_h100)
          GPU_CLUSTER=$([[ "$CLUSTER_H100" != "" ]] && echo "$CLUSTER_H100" || echo "$DEFAULT_H100_CLUSTER")
          ;;
        dgx_gb200)
          GPU_CLUSTER=$([[ "$CLUSTER_GB200" != "" ]] && echo "$CLUSTER_GB200" || echo "$DEFAULT_GB200_CLUSTER")
          ;;
        *)
          echo "Unknown CLEANUP_PLATFORM: $CLEANUP_PLATFORM"
          exit 1
          ;;
      esac
    - CLEANUP_CLUSTER="cpu_${GPU_CLUSTER#dgx*_}"
    - echo "Cleanup target = $CLEANUP_CLUSTER (CPU partition of $GPU_CLUSTER)"
    - export PYTHONPATH=$(pwd)
    - export RO_API_TOKEN=${PAT}
    - |
      python tests/test_utils/python_scripts/launch_jet_workload.py \
        --model cleanup \
        --test-case cleanup_old_artifacts \
        --environment dev \
        --n-repeat 1 \
        --time-limit 1800 \
        --scope cleanup \
        --account ${CI_SLURM_ACCOUNT} \
        --cluster ${CLEANUP_CLUSTER} \
        --platform ${CLEANUP_PLATFORM} \
        --container-tag ${CI_PIPELINE_ID} \
        --container-image ${UTILITY_IMAGE} \
        --record-checkpoints false

functional:cleanup_dgx_a100:
  extends: [.functional_cleanup]
  variables:
    CLEANUP_PLATFORM: dgx_a100
    CLEANUP_PATHS: $CLEANUP_PATHS_DGX_A100

functional:cleanup_dgx_h100:
  extends: [.functional_cleanup]
  variables:
    CLEANUP_PLATFORM: dgx_h100
    CLEANUP_PATHS: $CLEANUP_PATHS_DGX_H100

functional:cleanup_dgx_gb200:
  extends: [.functional_cleanup]
  variables:
    CLEANUP_PLATFORM: dgx_gb200
    CLEANUP_PATHS: $CLEANUP_PATHS_DGX_GB200

functional:run_lts_dgx_a100:
  extends: [.functional_run]
  allow_failure: true
  needs:
    - functional:configure
    - test:build_image
    - job: functional:smoke-h100
      optional: true
    - job: functional:cleanup_dgx_a100
      optional: true
  variables:
    ENVIRONMENT: lts
    CLUSTER: A100

functional:run_lts_dgx_h100:
  extends: [.functional_run]
  allow_failure: true
  needs:
    - functional:configure
    - test:build_image
    - job: functional:smoke-h100
      optional: true
    - job: functional:cleanup_dgx_h100
      optional: true
  variables:
    ENVIRONMENT: lts
    CLUSTER: H100

functional:run_lts_dgx_gb200:
  extends: [.functional_run]
  allow_failure: true
  needs:
    - functional:configure
    - test:build_image
    - job: functional:smoke-gb200
      optional: true
    - job: functional:cleanup_dgx_gb200
      optional: true
  variables:
    ENVIRONMENT: lts
    CLUSTER: GB200

functional:run_dev_dgx_a100:
  extends: [.functional_run]
  needs:
    - functional:configure
    - test:build_image
    - job: functional:smoke-h100
      optional: true
    - job: functional:cleanup_dgx_a100
      optional: true
  variables:
    ENVIRONMENT: dev
    CLUSTER: A100

functional:run_dev_dgx_h100:
  extends: [.functional_run]
  needs:
    - functional:configure
    - test:build_image
    - job: functional:smoke-h100
      optional: true
    - job: functional:cleanup_dgx_h100
      optional: true
  variables:
    ENVIRONMENT: dev
    CLUSTER: H100

functional:run_dev_dgx_gb200:
  extends: [.functional_run]
  needs:
    - functional:configure
    - test:build_image
    - job: functional:smoke-gb200
      optional: true
    - job: functional:cleanup_dgx_gb200
      optional: true
  variables:
    ENVIRONMENT: dev
    CLUSTER: GB200

functional:run_nemo:
  extends: [.functional_tests_rules]
  trigger:
    project: "dl/joc/nemo-ci"
    branch: main-mirror
    strategy: depend
  inherit:
    variables: true
  variables:
    MCORE_COMMIT: $CI_COMMIT_SHA
    TEST_NEMO2_MODULE: "True"
    ALLOW_FAILURE_DEPENDENCY: "True"
    TESTS_TO_RUN_ON_THIS_COMMIT: nightly
  rules:
    - if: $FUNCTIONAL_TEST == "yes"
      when: manual
      allow_failure: true
    - when: never

functional:x_notify:
  extends: [.functional_tests_rules]
  image: ${UTILITY_IMAGE}:${CI_PIPELINE_ID}
  needs:
    - functional:run_lts_dgx_a100
    - functional:run_dev_dgx_a100
    - functional:run_lts_dgx_h100
    - functional:run_dev_dgx_h100
    - functional:run_lts_dgx_gb200
    - functional:run_dev_dgx_gb200
  tags:
    - arch/amd64
    - env/prod
    - origin/jet-fleet
    - owner/jet-core
    - purpose/utility
    - team/megatron
  variables:
    RO_API_TOKEN: ${PROJECT_ACCESS_TOKEN_MCORE}
    CONTEXT: $FUNCTIONAL_TEST_SCOPE
  script:
    - env
    - |
      if [[ "$CI_COMMIT_BRANCH" == *dev* ]]; then
        export WEBHOOK_URL=${MCORE_NOTIFICATION_HOOK_DEV}
      else
        export WEBHOOK_URL=${MCORE_NOTIFICATION_HOOK}
      fi
    - export RO_API_TOKEN=${PROJECT_ACCESS_TOKEN_MCORE}
    - export GITLAB_ENDPOINT
    - export CONTEXT=$FUNCTIONAL_TEST_SCOPE
    - export TAG_TEAM=$([[ "$CI_COMMIT_BRANCH" == "main" ]] && echo "1" || "0")
    - export TEAM_SLUG=$SLACK_ADMIN
    - |
      python tests/test_utils/python_scripts/notify.py \
        --pipeline-id "${CI_PIPELINE_ID}" \
        --check-for functional-tests \
        --pipeline-context $CONTEXT \
        --pipeline-created-at "${CI_PIPELINE_CREATED_AT}"

  artifacts:
    when: always
    paths:
      - scripts
  rules:
    - if: ($CI_PIPELINE_SOURCE == "schedule" || $CI_COMMIT_BRANCH == "main") && $FUNCTIONAL_TEST == "yes"
      when: always
    - when: never

functional:x_download_golden_values:
  extends: [.functional_tests_rules]
  image: ${UTILITY_IMAGE}:${CI_PIPELINE_ID}
  tags:
    - arch/amd64
    - env/prod
    - origin/jet-fleet
    - owner/jet-core
    - purpose/utility
    - team/megatron
  script:
    - env
    - export RO_API_TOKEN=${PROJECT_ACCESS_TOKEN_MCORE}
    - export GITLAB_ENDPOINT
    - python tests/test_utils/python_scripts/download_golden_values.py --pipeline-id ${CI_PIPELINE_ID}
  artifacts:
    paths:
      - tests/
  rules:
    - if: $FUNCTIONAL_TEST == "yes"
      when: manual
      allow_failure: true
    - when: never
