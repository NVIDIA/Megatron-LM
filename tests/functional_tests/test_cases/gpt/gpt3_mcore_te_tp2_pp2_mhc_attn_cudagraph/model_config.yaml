ENV_VARS:
  CUDA_DEVICE_MAX_CONNECTIONS: 1
  NVTE_ALLOW_NONDETERMINISTIC_ALGO: 0
  NCCL_ALGO: Ring
  CUBLAS_WORKSPACE_CONFIG: :4096:8
MODEL_ARGS:
  # Minimal real pipeline milestone: TP=2, PP=2, DP=1 and eight
  # microbatches exercise the non-interleaved 1F1B schedule on four GPUs.
  --num-layers: 12
  --hidden-size: 512
  --num-attention-heads: 8
  --micro-batch-size: 4
  --global-batch-size: 32
  --seq-length: 1024
  --max-position-embeddings: 1024
  --train-iters: 8
  --exit-interval: 8
  --timing-log-level: 0
  --lr-decay-iters: 320000
  --save: ${CHECKPOINT_SAVE_PATH}
  --load: ${CHECKPOINT_LOAD_PATH}
  --save-interval: 1000
  # Mock data makes this correctness smoke independent of cluster-specific
  # dataset mounts while preserving the real model/pipeline execution path.
  --tokenizer-type: NullTokenizer
  --vocab-size: 50257
  --mock-data: true
  --split: 949,50,1
  --distributed-backend: nccl
  --lr: 0.00015
  --lr-decay-style: cosine
  --min-lr: 1.0e-5
  --weight-decay: 1e-2
  --clip-grad: 1.0
  --lr-warmup-fraction: .01
  --log-interval: 1
  --log-num-zeros-in-grad: true
  --log-params-norm: true
  --tensorboard-dir: ${TENSORBOARD_PATH}
  --eval-interval: 1000
  --eval-iters: 1
  --transformer-impl: transformer_engine
  --tensor-model-parallel-size: 2
  --pipeline-model-parallel-size: 2
  --deterministic-mode: true
  --no-gradient-accumulation-fusion: true
  --attention-softmax-in-fp32: true
  --use-mcore-models: true
  --ckpt-format: torch_dist
  --dist-ckpt-optim-fully-reshardable: true
  --dist-ckpt-strictness: log_all
  --data-cache-path: ${DATA_CACHE_PATH}
  --bf16: true
  --attention-backend: unfused
  --sequence-parallel: true
  --log-memory-to-tensorboard: true
  --enable-hyper-connections: true
  --num-residual-streams: 4
  --mhc-sinkhorn-iterations: 20
  --mhc-init-gating-factor: 0.01
  --recompute-granularity: selective
  --recompute-modules: "[mhc]"
  --mhc-recompute-layer-num: 2

  # Only the one-stream attention consumer is captured. mHC mapping,
  # aggregation, post-processing, MLP, and recompute stay eager.
  --cuda-graph-impl: transformer_engine
  --cuda-graph-modules: "[attn]"
  --cuda-graph-warmup-steps: 3
  --te-rng-tracker: true
TEST_TYPE: regular
METRICS:
  - "lm loss"
  - "num-zeros"
