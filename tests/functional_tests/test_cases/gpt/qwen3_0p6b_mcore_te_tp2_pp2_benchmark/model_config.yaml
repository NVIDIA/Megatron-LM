ENV_VARS:
  CUDA_DEVICE_MAX_CONNECTIONS: 1
  NVTE_ALLOW_NONDETERMINISTIC_ALGO: 0
  NCCL_ALGO: Ring
  CUBLAS_WORKSPACE_CONFIG: :4096:8
  CUDNN_BENCHMARK: "false"
  CUDNN_DETERMINISTIC: "true"
  BENCHMARK_TEST: 1
MODEL_ARGS:
  --num-layers: 4
  --hidden-size: 1024
  --ffn-hidden-size: 3072
  --kv-channels: 128
  --num-attention-heads: 16
  --group-query-attention: true
  --num-query-groups: 8
  --log-throughput: true
  --log-params-norm: true
  --log-memory-to-tensorboard: true
  --log-num-zeros-in-grad: true
  --log-timers-to-tensorboard: true
  --tensorboard-dir: ${TENSORBOARD_PATH}
  --micro-batch-size: 1
  --global-batch-size: 16
  --seq-length: 4096
  --max-position-embeddings: 40960
  --train-iters: 20
  --timing-log-level: 0
  --save: ${CHECKPOINT_SAVE_PATH}
  --load: ${CHECKPOINT_LOAD_PATH}
  --data-path: /home/gitlab-runner/data/pile_wikipedia_demo/pile_wikipedia_demo
  --split: 100,0,0
  --tokenizer-type: HuggingFaceTokenizer
  --tokenizer-model: /home/gitlab-runner/tokenizers/qwentokenizer
  --trust-remote-code: true
  --distributed-backend: nccl
  --lr: 3.0e-3
  --lr-decay-style: cosine
  --min-lr: 3.0e-4
  --weight-decay: 0.1
  --clip-grad: 1.0
  --lr-warmup-fraction: .01
  --log-interval: 1
  --save-interval: 100000
  --eval-interval: 100000
  --eval-iters: 0
  --transformer-impl: transformer_engine
  --tensor-model-parallel-size: 2
  --pipeline-model-parallel-size: 2
  --sequence-parallel: true
  --use-distributed-optimizer: true
  --overlap-grad-reduce: true
  --overlap-param-gather: true
  --no-mmap-bin-files: true
  --attention-softmax-in-fp32: true
  --accumulate-allreduce-grads-in-fp32: true
  --use-mcore-models: true
  --ckpt-format: torch
  --bf16: true
  --disable-bias-linear: true
  --qk-layernorm: true
  --normalization: RMSNorm
  --norm-epsilon: 1e-6
  --position-embedding-type: rope
  --no-position-embedding: true
  --rotary-base: 1000000
  --rotary-percent: 1.0
  --no-rope-fusion: true
  --swiglu: true
  --attention-dropout: 0.0
  --hidden-dropout: 0.0
  --init-method-std: 0.02
  --seed: 42
  --adam-beta1: 0.9
  --adam-beta2: 0.95
  --make-vocab-size-divisible-by: 64
  --no-save-optim: true
  --no-save-rng: true
TEST_TYPE: regular
