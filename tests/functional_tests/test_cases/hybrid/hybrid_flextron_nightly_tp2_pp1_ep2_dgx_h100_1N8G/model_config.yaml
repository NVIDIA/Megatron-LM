ENV_VARS:
  CUDA_DEVICE_MAX_CONNECTIONS: 1
  NVTE_ALLOW_NONDETERMINISTIC_ALGO: 1
  NCCL_ALGO: Ring
  CUBLAS_WORKSPACE_CONFIG: :4096:8
  TORCH_COMPILE_DISABLE: 1
  TORCHDYNAMO_DISABLE: 1
  TORCH_INDUCTOR_DISABLE: 1
MODEL_ARGS:
  # ── Hybrid Mamba / Attention / MoE backbone (scaled down from train_flextron.sh) ──
  --num-layers: 12
  --hidden-size: 1024
  --ffn-hidden-size: 512
  --num-attention-heads: 32
  --group-query-attention: true
  --num-query-groups: 2
  --kv-channels: 128
  --mamba-num-heads: 32
  --mamba-head-dim: 64
  --hybrid-override-pattern: MEM*EMEM*EME*
  --is-hybrid-model: true
  --position-embedding-type: none
  --normalization: RMSNorm
  --squared-relu: true
  --use-fused-weighted-squared-relu: true
  --untie-embeddings-and-output-weights: true
  --disable-bias-linear: true
  --init-method-std: 0.0173
  --attention-dropout: 0.0
  --hidden-dropout: 0.0
  # ── MoE ───────────────────────────────────────────────────────────────────
  --num-experts: 32
  --moe-router-topk: 2
  --moe-router-score-function: sigmoid
  --moe-router-enable-expert-bias: true
  --moe-router-topk-scaling-factor: 2.5
  --moe-router-dtype: fp32
  --moe-router-load-balancing-type: none
  --moe-aux-loss-coeff: 1.0e-4
  --moe-shared-expert-intermediate-size: 512
  --moe-shared-expert-overlap: true
  --moe-token-dispatcher-type: alltoall
  --moe-grouped-gemm: true
  --moe-permute-fusion: true
  --cross-entropy-loss-fusion: true
  --cross-entropy-fusion-impl: native
  # ── Parallelism (8 GPUs total: TP=2, EP=2, PP=1, CP=1 → DP=4) ─────────────
  --tensor-model-parallel-size: 2
  --pipeline-model-parallel-size: 1
  --expert-model-parallel-size: 2
  --expert-tensor-parallel-size: 1
  --context-parallel-size: 1
  --sequence-parallel: true
  --attention-backend: flash
  # ── Data / tokenizer (common_pile + GPT2 BPE, matches hybrid tests) ───────
  --seq-length: 2048
  --max-position-embeddings: 2048
  --micro-batch-size: 1
  --global-batch-size: 8
  --train-iters: 20
  --data-path: ${DATA_PATH}/text/common_pile/v01_filtered_data/my-gpt3_00_text_document
  --vocab-file: ${DATA_PATH}/text/common_pile/v01_filtered_data/bpe/vocab.json
  --merge-file: ${DATA_PATH}/text/common_pile/v01_filtered_data/bpe/merges.txt
  --split: 949,50,1
  --data-cache-path: ${DATA_CACHE_PATH}
  --no-mmap-bin-files: true
  --no-create-attention-mask-in-dataloader: true
  # ── Optimizer / schedule ──────────────────────────────────────────────────
  --lr: 1.0e-4
  --min-lr: 1.0e-5
  --lr-decay-style: cosine
  --lr-warmup-fraction: 0.01
  --weight-decay: 0.0
  --clip-grad: 1.0
  --adam-beta1: 0.9
  --adam-beta2: 0.98
  --use-distributed-optimizer: true
  --bf16: true
  # ── Logging / checkpointing ───────────────────────────────────────────────
  --log-interval: 1
  --log-params-norm: true
  --log-num-zeros-in-grad: true
  --log-validation-ppl-to-tensorboard: true
  --log-timers-to-tensorboard: true
  --log-memory-to-tensorboard: true
  --tensorboard-dir: ${TENSORBOARD_PATH}
  --save-interval: 10000
  --save: ${CHECKPOINT_SAVE_PATH}
  --ckpt-format: torch_dist
  --ckpt-fully-parallel-save: true
  --ckpt-fully-parallel-load: true
  --dist-ckpt-strictness: ignore_all
  --eval-interval: 1000
  --eval-iters: 4
  # ── Core model plumbing ───────────────────────────────────────────────────
  --use-mcore-models: true
  --transformer-impl: transformer_engine
  --export-default-te-spec: true
  --export-model-type: HybridModel
  --distributed-backend: nccl
  --distributed-timeout-minutes: 20
  # ── Flextron (from train_flextron.sh flex_options, int-lists with ÷8) ─────
  --flextron: true
  --enable-router: true
  --binary-mask: true
  --soft-mask: true
  --hard-sample-th: 0.996
  --router-beta: 1.0
  --original-model-sample-prob: 0.0
  --tau-init: 1.0
  --tau-decay: 0.9997
  --loss-alpha: 1.0
  --lr-mult-router: 100
  --router-gbs: 2
  --router-inter-dim: 256
  --budget-list: "[1.0 0.697]"
  --budget-probs: "[1.0 1.0]"
  --budget-type: param
  --emb-int-list: "[1024 768 512]"
  --mlp-int-list: "[512 384 256]"
  --mamba-int-list: "[32 24 16]"
  --moe-expert-int-list: "[32 24 16]"
  --linear-scaler-start: 1.0
  --linear-scaler-end: 10.0
  --slice: true
  --router-std: 0.1
TEST_TYPE: regular
