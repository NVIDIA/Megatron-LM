ENV_VARS:
  SKIP_PYTEST: 1
  CUDA_DEVICE_MAX_CONNECTIONS: 1
  NVTE_ALLOW_NONDETERMINISTIC_ALGO: 1
  NCCL_ALGO: Ring
  CUBLAS_WORKSPACE_CONFIG: ":4096:8"
  # PTQ env vars
  MODEL_BF16_CKPT: "${DATA_PATH}/model/mamba_hybrid_2b/dcp/mcore-v1_bf16/checkpoint"
  TOKENIZER: "${DATA_PATH}/model/mamba_hybrid_2b/dcp/mcore-v1_bf16/multiMixV8.gpt4o_nc_sd.500000.128k.vocab.json"
  PTQ_QUANTIZED_CKPT: "${DATA_CACHE_PATH}/ptq_quantized_ckpt"
BEFORE_SCRIPT: |
  # Stage 1: PTQ quantization via quantize.py directly
  echo "=== Stage 1: Running PTQ (NVFP4) ==="
  cd /opt/megatron-lm
  # Env vars that arguments.sh would normally set
  export TOKENIZERS_PARALLELISM=False
  export OMP_NUM_THREADS=1
  export NCCL_IB_SL=1
  export NCCL_IB_TIMEOUT=22
  uv run --no-sync python -m torch.distributed.run --nproc_per_node=1 \
    examples/post_training/modelopt/quantize.py \
    --micro-batch-size 1 \
    --global-batch-size 8 \
    --save-interval 1000 \
    --untie-embeddings-and-output-weights \
    --disable-bias-linear \
    --position-embedding-type none \
    --hidden-size 2048 \
    --ffn-hidden-size 11264 \
    --num-attention-heads 16 \
    --kv-channels 128 \
    --hybrid-layer-pattern M-M-M-M*-M-M-M-M*-M-M-M-M-M*-M-M-M-M-M*-M-M-M-M-M- \
    --normalization RMSNorm \
    --swiglu \
    --seq-length 4096 \
    --max-position-embeddings 4096 \
    --bf16 \
    --attention-backend flash \
    --tokenizer-type TikTokenizer \
    --tiktoken-pattern v2 \
    --tokenizer-model ${TOKENIZER} \
    --export-model-type MambaModel \
    --tensor-model-parallel-size 1 \
    --pipeline-model-parallel-size 1 \
    --context-parallel-size 1 \
    --load ${MODEL_BF16_CKPT} \
    --save ${PTQ_QUANTIZED_CKPT} \
    --export-quant-cfg NVFP4_DEFAULT_CFG \
    --finetune --auto-detect-ckpt-format \
    --distributed-timeout-minutes 30 \
    \
    --export-default-te-spec --calib-size 8 --skip-generate
  echo "=== Stage 1 complete ==="
MODEL_ARGS:
  # KD teacher/config
  --export-default-te-spec: true
  --export-kd-teacher-load: ${MODEL_BF16_CKPT}
  --auto-detect-ckpt-format: true
  --finetune: true
  # Architecture (must match mamba_hybrid_2b)
  --untie-embeddings-and-output-weights: true
  --disable-bias-linear: true
  --position-embedding-type: none
  --hidden-size: 2048
  --ffn-hidden-size: 11264
  --num-attention-heads: 16
  --kv-channels: 128
  --hybrid-layer-pattern: M-M-M-M*-M-M-M-M*-M-M-M-M-M*-M-M-M-M-M*-M-M-M-M-M-
  --normalization: RMSNorm
  --swiglu: true
  --export-model-type: MambaModel
  --bf16: true
  # Tokenizer
  --tokenizer-type: TikTokenizer
  --tiktoken-pattern: v2
  --tokenizer-model: ${TOKENIZER}
  # Parallelism
  --tensor-model-parallel-size: 1
  # Training
  --micro-batch-size: 1
  --global-batch-size: 8
  --seq-length: 4096
  --max-position-embeddings: 4096
  --train-iters: 3
  --lr: 0.00015
  --lr-decay-style: cosine
  --lr-decay-iters: 320000
  --min-lr: 1.0e-5
  --weight-decay: 1e-2
  --clip-grad: 1.0
  --lr-warmup-fraction: .01
  # Checkpoint & data
  --save: ${CHECKPOINT_SAVE_PATH}
  --load: "${DATA_CACHE_PATH}/ptq_quantized_ckpt"
  --data-path: "${DATA_PATH}/text/common_pile/v01_filtered_data/my-gpt3_00_text_document"
  --split: "949,50,1"
  --distributed-backend: nccl
  --transformer-impl: transformer_engine
  --use-distributed-optimizer: true
  --ckpt-format: torch_dist
  --data-cache-path: ${DATA_CACHE_PATH}
  # Logging
  --log-interval: 1
  --save-interval: 1000
  --eval-interval: 1000
  --eval-iters: 10
  --log-params-norm: true
  --log-num-zeros-in-grad: true
  --log-validation-ppl-to-tensorboard: true
  --log-timers-to-tensorboard: true
  --tensorboard-dir: ${TENSORBOARD_PATH}
  --log-memory-to-tensorboard: true
  --timing-log-level: 0
  --no-gradient-accumulation-fusion: true
  --attention-backend: flash
  --distributed-timeout-minutes: 30
TEST_TYPE: regular
