ENV_VARS:
  CUDA_DEVICE_MAX_CONNECTIONS: 1
  NVTE_ALLOW_NONDETERMINISTIC_ALGO: 0
  NCCL_ALGO: Ring
  CUBLAS_WORKSPACE_CONFIG: :4096:8
  ENABLE_LIGHTWEIGHT_MODE: true
MODEL_ARGS:
  --hidden-size: 512
  --num-attention-heads: 8
  --multi-latent-attention: true
  --q-lora-rank: 192
  --kv-lora-rank: 64
  --qk-head-dim: 16
  --qk-pos-emb-head-dim: 8
  --v-head-dim: 16
  --hybrid-layer-pattern: WEC-|H-C-/W-
  --spec: "[megatron.core.models.hybrid.hybrid_layer_specs hybrid_dsv4_stack_spec]"
  --disable-bias-linear: true
  --experimental-attention-variant: dsv4_hybrid
  --dsa-indexer-n-heads: 64
  --dsa-indexer-head-dim: 128
  --dsa-indexer-topk: 512
  --dsa-indexer-loss-coeff: 0.01
  --dsa-indexer-use-sparse-loss: true
  --csa-window-size: 128
  --csa-compress-ratios: ([0,4,128,4,0])
  --csa-compress-rotary-base: 40000
  --dsa-kernel-backend: none
  --num-experts: 8
  --expert-model-parallel-size: 1
  --expert-tensor-parallel-size: 1
  --moe-router-topk: 2
  --moe-token-dispatcher-type: alltoall
  --moe-grouped-gemm: true
  --moe-router-dtype: fp32
  --moe-router-load-balancing-type: aux_loss
  --moe-aux-loss-coeff: 1.0e-4
  --enable-hyper-connections: true
  --num-residual-streams: 4
  --mhc-sinkhorn-iterations: 20
  --mtp-num-layers: 1
  --mtp-loss-scaling-factor: 0.1
  --log-params-norm: true
  --log-num-zeros-in-grad: true
  --log-validation-ppl-to-tensorboard: true
  --log-timers-to-tensorboard: true
  --tensorboard-dir: ${TENSORBOARD_PATH}
  --micro-batch-size: 4
  --global-batch-size: 32
  --seq-length: 1024
  --use-varlen-dataset: true
  --mock-data: true
  --varlen-mock-dataset-config-json: '\''{\"mode\":\"distribution\",\"type\":\"lognormal\",\"format\":\"thd\",\"min_seq_len\":1024,\"max_seq_len\":1024,\"mean_seq_len\":1024,\"lognormal_sigma\":1.1}\'''
  --sequence-packing-scheduler: dp_balanced
  --max-seqlen-per-dp-cp-rank: 512
  --pad-packed-seq-alignment: max
  --no-pad-packed-seq-by-appending-dummy-seq: true
  --calculate-per-token-loss: true
  --thd-max-packed-sequences: 8
  --cp-partition-mode: contiguous
  --dataloader-type: single
  --tokenizer-type: NullTokenizer
  --vocab-size: 100352
  --position-embedding-type: rope
  --max-position-embeddings: 1024
  --train-iters: 50
  --timing-log-level: 0
  --lr-decay-iters: 320000
  --save: ${CHECKPOINT_SAVE_PATH}
  --load: ${CHECKPOINT_LOAD_PATH}
  --split: 949,50,1
  --distributed-backend: nccl
  --lr: 0.00015
  --lr-decay-style: cosine
  --min-lr: 1.0e-5
  --weight-decay: 1e-2
  --clip-grad: 1.0
  --lr-warmup-fraction: .01
  --log-interval: 1
  --save-interval: 25
  --eval-interval: 1000
  --eval-iters: 10
  --transformer-impl: transformer_engine
  --tensor-model-parallel-size: 1
  --pipeline-model-parallel-size: 2
  --context-parallel-size: 2
  --sequence-parallel: true
  --untie-embeddings-and-output-weights: true
  --deterministic-mode: true
  --no-gradient-accumulation-fusion: true
  --attention-softmax-in-fp32: true
  --use-mcore-models: true
  --cuda-graph-impl: transformer_engine
  --cuda-graph-dynamic-microbatches: true
  --cuda-graph-modules: "[attn moe_router moe_preprocess]"
  --te-rng-tracker: true
  --ckpt-format: torch_dist
  --data-cache-path: ${DATA_CACHE_PATH}
  --bf16: true
  --attention-backend: unfused
  --log-memory-to-tensorboard: true
TEST_TYPE: ckpt-resume
METRICS:
  - "lm loss"
  - "num-zeros"
  - "mtp_1 loss"
