ENV_VARS:
  SKIP_PYTEST: 1
  CUDA_DEVICE_MAX_CONNECTIONS: 1
  NVTE_ALLOW_NONDETERMINISTIC_ALGO: 1
  NCCL_ALGO: Ring
  CUBLAS_WORKSPACE_CONFIG: ":4096:8"
  # PTQ env vars for quantize.sh
  MLM_MODEL_CKPT: "${DATA_PATH}/model/nemotron6/3b_hybrid_moe/checkpoints/phase2_lc_reinit_emb"
  MLM_MODEL_SAVE: "${DATA_CACHE_PATH}/ptq_quantized_ckpt"
  MLM_SKIP_INSTALL: "1"
  MLM_EXTRA_ARGS: "--calib-size 8 --skip-generate"
  TP: "1"
  EP: "8"
  # TODO(aanoosheh) point dataset to ${DATA_PATH}/text/cnn_dailymail when ModelOpt updated in MLM
  HF_HOME: ${DATA_PATH}/.hf_cache
BEFORE_SCRIPT: |
  # Stage 1: PTQ quantization via quantize.sh
  echo "=== Stage 1: Running PTQ (NVFP4) ==="
  cd /opt/megatron-lm
  # Use uv (matching the main training runner) so dependencies are available
  export LAUNCH_SCRIPT="uv run --no-sync python -m torch.distributed.run --nproc_per_node=8"
  bash examples/post_training/modelopt/quantize.sh nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16 NVFP4_DEFAULT_CFG
  echo "=== Stage 1 complete ==="
  echo '{"kv_channels": 128}' | yq -P > ${DATA_CACHE_PATH}/teacher_config.yaml   # <-- DEFAULT CHANNELS CALCULATION INCORRECT
MODEL_ARGS:
  # KD teacher/config
  --export-te-mcore-model: true
  --export-kd-teacher-load: "${DATA_PATH}/model/nemotron6/3b_hybrid_moe/checkpoints/phase2_lc_reinit_emb"
  --export-kd-teacher-model-config: ${DATA_CACHE_PATH}/teacher_config.yaml
  --auto-detect-ckpt-format: true
  --finetune: true
  # Architecture (must match 30B-A3B)
  --trust-remote-code: true
  --enable-experimental: true
  --moe-token-dispatcher-type: allgather
  --moe-permute-fusion: true
  --use-fused-weighted-squared-relu: true
  --cross-entropy-loss-fusion: true
  --cross-entropy-fusion-impl: native
  --moe-router-score-function: sigmoid
  --moe-grouped-gemm: true
  --num-experts: 128
  --moe-router-topk: 6
  --moe-aux-loss-coeff: 1e-4
  --moe-router-topk-scaling-factor: 2.5
  --moe-router-enable-expert-bias: true
  --moe-router-dtype: fp32
  --moe-router-load-balancing-type: seq_aux_loss
  --moe-shared-expert-intermediate-size: 3712
  --attention-backend: flash
  --disable-gloo-process-groups: true
  --mamba-num-heads: 64
  --mamba-head-dim: 64
  --hybrid-layer-pattern: MEMEM*EMEMEM*EMEMEM*EMEMEM*EMEMEM*EMEMEMEM*EMEMEMEME
  --use-mcore-models: true
  --untie-embeddings-and-output-weights: true
  --disable-bias-linear: true
  --position-embedding-type: none
  --squared-relu: true
  --hidden-size: 2688
  --num-attention-heads: 32
  --group-query-attention: true
  --num-query-groups: 2
  --ffn-hidden-size: 1856
  --kv-channels: 128
  --normalization: RMSNorm
  --export-model-type: MambaModel
  --bf16: true
  # Tokenizer
  --tokenizer-type: TikTokenizer
  --tiktoken-pattern: v2
  --tokenizer-model: "${DATA_PATH}/model/nemotron6/tokenizers/multiMixV8.gpt4o_nc_sd.500000.128k.vocab.json"
  # Parallelism
  --tensor-model-parallel-size: 1
  --expert-model-parallel-size: 8
  --expert-tensor-parallel-size: 1
  # Training
  --micro-batch-size: 1
  --global-batch-size: 8
  --seq-length: 4096
  --max-position-embeddings: 8192
  --train-iters: 50
  --lr: 0.00015
  --lr-decay-style: cosine
  --lr-decay-iters: 320000
  --min-lr: 1.0e-5
  --weight-decay: 1e-2
  --clip-grad: 1.0
  --lr-warmup-fraction: .01
  # Checkpoint & data
  --save: ${CHECKPOINT_SAVE_PATH}
  --load: "${DATA_CACHE_PATH}/ptq_quantized_ckpt"
  --data-path: "${DATA_PATH}/text/common_pile/v01_filtered_data/my-gpt3_00_text_document"
  --split: "949,50,1"
  --distributed-backend: nccl
  --transformer-impl: transformer_engine
  --use-distributed-optimizer: true
  --ckpt-format: torch_dist
  --data-cache-path: ${DATA_CACHE_PATH}
  # Logging
  --log-interval: 1
  --save-interval: 10000
  --eval-interval: 1000
  --eval-iters: 10
  --log-params-norm: true
  --log-num-zeros-in-grad: true
  --log-validation-ppl-to-tensorboard: true
  --log-timers-to-tensorboard: true
  --tensorboard-dir: ${TENSORBOARD_PATH}
  --log-memory-to-tensorboard: true
  --timing-log-level: 0
  --no-gradient-accumulation-fusion: true
  --distributed-timeout-minutes: 30
TEST_TYPE: regular
