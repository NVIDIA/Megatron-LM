ENV_VARS:
  CUDA_DEVICE_MAX_CONNECTIONS: 1
  NVTE_ALLOW_NONDETERMINISTIC_ALGO: 0
  NCCL_ALGO: Ring
  CUBLAS_WORKSPACE_CONFIG: :4096:8
  MAMBA_DETERMINISTIC: 1
MODEL_ARGS:
  --model-provider: nemotron-moe-vlm
  --dataset-provider: mock
  --mimo-layout: colocated
  --encoder-tp: 2
  --encoder-dp: 4
  --llm-offset: 0
  --llm-tp: 4
  --llm-pp: 1
  --llm-cp: 1
  --llm-dp: 2
  --llm-ep: 2
  --llm-expt-tp: 1
  --hybrid-layer-pattern: "E*"
  --num-layers: 2
  --hidden-size: 256
  --ffn-hidden-size: 1024
  --num-attention-heads: 8
  --group-query-attention: true
  --num-query-groups: 4
  --kv-channels: 32
  --num-experts: 8
  --moe-router-topk: 2
  --moe-ffn-hidden-size: 256
  --moe-token-dispatcher-type: alltoall
  --moe-router-load-balancing-type: aux_loss
  --moe-aux-loss-coeff: 1.0e-2
  --squared-relu: true
  --disable-bias-linear: true
  --normalization: RMSNorm
  --position-embedding-type: none
  --init-method-std: 0.02
  --attention-dropout: 0.1
  --hidden-dropout: 0.1
  --vocab-size: 1024
  --image-token-id: 511
  --img-h: 32
  --img-w: 32
  --patch-dim: 16
  --image-seq-length: 1
  --pixel-shuffle: true
  --disable-vision-class-token: true
  --freeze-vit: true
  --mock-dataset-size: 64
  --seq-length: 16
  --max-position-embeddings: 16
  --micro-batch-size: 2
  --global-batch-size: 8
  --train-iters: 4
  --lr: 1.0e-4
  --min-lr: 1.0e-5
  --lr-decay-style: cosine
  --lr-decay-iters: 4
  --lr-warmup-iters: 0
  --weight-decay: 0.01
  --clip-grad: 1.0
  --adam-beta1: 0.9
  --adam-beta2: 0.95
  --calculate-per-token-loss: true
  --use-distributed-optimizer: true
  --ddp-bucket-size: 0
  --accumulate-allreduce-grads-in-fp32: true
  --no-gradient-accumulation-fusion: true
  --transformer-impl: transformer_engine
  --attention-backend: unfused
  --bf16: true
  --deterministic-mode: true
  --data-parallel-random-init: true
  --rerun-mode: disabled
  --save: ${CHECKPOINT_SAVE_PATH}
  --load: ${CHECKPOINT_LOAD_PATH}
  --save-interval: 2
  --ckpt-format: torch_dist
  --no-ckpt-fully-parallel-save: true
  --dist-ckpt-strictness: log_all
  --use-checkpoint-opt_param-scheduler: true
  --tensorboard-dir: ${TENSORBOARD_PATH}
  --log-interval: 1
  --eval-interval: 1000
  --eval-iters: 0
TEST_TYPE: ckpt-resume
METRICS:
  - lm loss
