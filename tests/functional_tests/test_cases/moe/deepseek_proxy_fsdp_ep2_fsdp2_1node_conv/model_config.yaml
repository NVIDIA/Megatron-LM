ENV_VARS:
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  NCCL_NVLS_ENABLE: 0
  NVTE_FUSED_ATTN: 1

  # FSDP Perf settings
  export CUDA_DEVICE_MAX_CONNECTIONS=32
  NVTE_NORM_FWD_USE_CUDNN: 1
  NVTE_NORM_BWD_USE_CUDNN: 1
  NVTE_FWD_LAYERNORM_SM_MARGIN: 16
  NVTE_BWD_LAYERNORM_SM_MARGIN: 16

  PYTHONWARNINGS: ignore
  NCCL_DEBUG: VERSION
  NCCL_GRAPH_REGISTER: 0
  NCCL_ALGO: Ring

MODEL_ARGS:
  # Distributed args
  --distributed-timeout-minutes: 60
  --tensor-model-parallel-size: 1
  --pipeline-model-parallel-size: 1
  --expert-model-parallel-size: 2
  --context-parallel-size: 1
  --expert-tensor-parallel-size: 1
  --use-distributed-optimizer: true
  --overlap-grad-reduce: true
  --overlap-param-gather: true

  --num-distributed-optimizer-instances: 1

  # FSDP args
  --use-megatron-fsdp: true
  --data-parallel-sharding-strategy: "optim_grads_params"
  --outer-dp-sharding-strategy: "no_shard"

  --ckpt-format: "fsdp_dtensor"
  #--no-gradient-accumulation-fusion: true

  # Precision
  --fp8-format: "e4m3"
  --fp8-recipe: "tensorwise"
  --fp8-param-gather: true

  # Training args
  --use-mcore-models: true
  --sequence-parallel: true
  --disable-bias-linear: true
  --micro-batch-size: 1
  --global-batch-size: 128
  --train-iters: 20
  --exit-duration-in-mins: 60
  --no-check-for-nan-in-loss-and-grad: true
  --cross-entropy-loss-fusion: true
  --cross-entropy-fusion-impl: te
  --manual-gc: true
  --manual-gc-interval: 10
  --deterministic-mode: true
  --exit-interval: 20000

  # Transformer Engine args
  --transformer-impl: transformer_engine

  # Recompute args
  --recompute-granularity: selective
  --recompute-modules: "layernorm,mla_up_proj,moe_act"

  # CPU Offloading
  --fine-grained-activation-offloading: true
  --offload-modules: "core_attn,attn_proj"  


  # Data args
  --seq-length: 4096
  --data-cache-path: ${DATA_CACHE_PATH}
  --data-path: ${DATA_PATH}/text/the_pile/shard00/my-gpt3_00_text_document
  --vocab-file: ${DATA_PATH}/text/the_pile/shard00/bpe/vocab.json
  --merge-file: ${DATA_PATH}/text/the_pile/shard00/bpe/merges.txt
  --split: 949,50,1


  # Network
  --num-layers: 2
  --hidden-size: 7168
  --ffn-hidden-size: 18432
  --num-attention-heads: 128
  --kv-channels: 128
  --max-position-embeddings: 4096
  --position-embedding-type: rope
  --rotary-base: 10000
  --make-vocab-size-divisible-by: 128
  --normalization: RMSNorm
  --norm-epsilon: 1e-6
  --swiglu: true
  --untie-embeddings-and-output-weights: true
  --multi-latent-attention: true



  # Regularization args
  --attention-dropout: 0.0
  --hidden-dropout: 0.0
  --clip-grad: 1.0
  --weight-decay: 0.1
  --qk-layernorm: true

  # Learning Rate args
  --lr-warmup-fraction: .01
  --lr: 0.00015
  --min-lr: 1.0e-5
  --lr-decay-style: cosine
  --adam-beta1: 0.9
  --adam-beta2: 0.95
  
  # MoE args (DeepSeek-style)
  --num-experts: 8
  --moe-layer-freq: ([0]*1+[1]*1)
  --moe-ffn-hidden-size: 2048
  --moe-shared-expert-intermediate-size: 2048
  --moe-router-load-balancing-type: seq_aux_loss
  --moe-router-topk: 8
  --moe-grouped-gemm: true
  --moe-aux-loss-coeff: 1e-4
  --moe-router-group-topk: 4
  --moe-router-num-groups: 8
  --moe-router-topk-scaling-factor: 2.5
  --moe-router-score-function: sigmoid
  --moe-router-enable-expert-bias: true
  --moe-router-bias-update-rate: 1e-3
  --moe-router-dtype: fp32
  --moe-permute-fusion: true
  --moe-router-fusion: true
  --moe-router-pre-softmax: true
  
  # MoE Dispatcher
  --moe-token-dispatcher-type: flex
  --moe-flex-dispatcher-backend: hybridep
  
  # MLA args (DeepSeek-style)
  --q-lora-rank: 1536
  --kv-lora-rank: 512
  --qk-head-dim: 128
  --qk-pos-emb-head-dim: 64
  --v-head-dim: 128
  --rotary-scaling-factor: 40
  --mscale: 1.0
  --mscale-all-dim: 1.0


  # Validation
  --eval-iters: 10
  --eval-interval: 200

  # Checkpointing
  # --save: ${CHECKPOINT_SAVE_PATH}
  # --load: ${CHECKPOINT_LOAD_PATH}
  --ckpt-format: fsdp_dtensor

  # Logging
  #--save-interval: 25
  --init-method-std: 0.02
  --log-timers-to-tensorboard: true
  --log-memory-to-tensorboard: true
  --log-num-zeros-in-grad: true
  --log-params-norm: true
  --log-validation-ppl-to-tensorboard: true
  --log-throughput: true
  --log-interval: 100
  #--logging-level: 10
  --tensorboard-dir: ${TENSORBOARD_PATH}

TEST_TYPE: regular
METRICS:
  - "iteration-time"
  - "lm loss"
  - "mem-allocated-bytes"
  - "mem-max-allocated-bytes"
