# Inference perf test: deepseek-style 16B MoE checkpoint, TP=1 PP=1 DP=1 (single GPU).
#
# Uses the gsm8k prompt dataset (real tokens) instead of synthetic. Synthetic
# `"hello "*N` is misleading for MoE models: identical token IDs route to the
# same expert subset every step, so the router/dispatcher path doesn't see
# realistic load.

MODEL: gpt_16b
TP: 1
PP: 1
DP: 1
DATASET: gsm8k
# OSL=2048 reflects the decode-heavy regime Nemo-RL rollouts care about.
# With short OSL (128) prefill dominates the per-token average and inflates
# the TPOT number; at OSL=2048 the decode steady-state shows through.
NUM_OUTPUT_TOKENS: 2048
NUM_WARMUP_ITERS: 2
NUM_TIMED_ITERS: 5
BATCH_SIZES:
  - 1
  - 8
  - 32
TOLERANCE_PCT: 10
METRICS:
  - throughput_tok_per_sec
  - avg_latency_ms
  - p50_latency_ms
  - p99_latency_ms
  - tpot_ms_per_tok
