# Inference perf test: deepseek-style 16B MoE checkpoint, TP=1 PP=1 DP=1 (single GPU).
#
# Uses the gsm8k prompt dataset (real tokens) instead of synthetic. Synthetic
# `"hello "*N` is misleading for MoE models: identical token IDs route to the
# same expert subset every step, so the router/dispatcher path doesn't see
# realistic load.

MODEL: gpt_16b
TP: 1
PP: 1
DP: 1
DATASET: gsm8k
# OSL=256 keeps CI wall time reasonable (~10 min) while still being long
# enough that decode dominates the work over prefill at our gsm8k ISL (~60).
NUM_OUTPUT_TOKENS: 256
NUM_WARMUP_ITERS: 2
NUM_TIMED_ITERS: 5
BATCH_SIZES:
  - 1
  - 8
  - 32
TOLERANCE_PCT: 10
# p99 omitted on purpose: with NUM_TIMED_ITERS=5 it is the max of 5 samples,
# not a real percentile, so it produces flaky regressions even when throughput
# / avg / p50 are stable. p99 is still recorded in results.json for visibility.
METRICS:
  - throughput_tok_per_sec
  - avg_latency_ms
  - p50_latency_ms
  - tpot_ms_per_tok
