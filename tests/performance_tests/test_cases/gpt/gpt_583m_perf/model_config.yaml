# Inference perf test: 583M mcore-mistral checkpoint, TP=1 PP=1 DP=1 (single GPU).
# Baseline values are recorded by `RECORD_BASELINE=1 run_perf_test.sh ...`
# and compared on subsequent runs with TOLERANCE_PCT tolerance.

MODEL: gpt_583m
TP: 1
PP: 1
DP: 1
NUM_INPUT_TOKENS: 512
NUM_OUTPUT_TOKENS: 128
NUM_WARMUP_ITERS: 2
NUM_TIMED_ITERS: 5
BATCH_SIZES:
  - 1
  - 8
  - 32
  - 128
TOLERANCE_PCT: 10
METRICS:
  - throughput_tok_per_sec
  - avg_latency_ms
  - p50_latency_ms
  - p99_latency_ms
  - tpot_ms_per_tok
