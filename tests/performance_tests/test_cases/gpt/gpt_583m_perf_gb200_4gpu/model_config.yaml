# Inference perf test: 583M mcore-mistral checkpoint, TP=1 PP=1 DP=4 (4 GPUs).
#
# GB200 single-node variant of gpt_583m_perf (which is DP=8 / 2 nodes on GB200).
# GB200 nodes have a 4-GPU/node limit, so the DP=8 single-node configuration
# used on H100 doesn't fit on a single GB200 node. This is a separate test
# (different world size, different baseline) — not a multi-node port of the
# DP=8 case.

MODEL: gpt_583m
TP: 1
PP: 1
DP: 4
NUM_INPUT_TOKENS: 512
NUM_OUTPUT_TOKENS: 128
NUM_WARMUP_ITERS: 2
NUM_TIMED_ITERS: 5
BATCH_SIZES:
  - 1
  - 8
  - 32
  - 128
TOLERANCE_PCT: 10
METRICS:
  - throughput_tok_per_sec
  - avg_latency_ms
  - p50_latency_ms
  - tpot_ms_per_tok
