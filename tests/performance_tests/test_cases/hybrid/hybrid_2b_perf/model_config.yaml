# Inference perf test: hybrid mamba 2B checkpoint, TP=1 PP=1 DP=1 (single GPU).
#
# Uses the gsm8k prompt dataset (real tokens) instead of synthetic. Mamba
# state evolution and chunked-prefill scheduling are both content-sensitive,
# so identical synthetic tokens give an unrealistically optimistic throughput.

MODEL: hybrid_2b
TP: 1
PP: 1
DP: 1
DATASET: gsm8k
NUM_OUTPUT_TOKENS: 128
NUM_WARMUP_ITERS: 2
# 5 timed iters produced ~10–15% run-to-run swing on GB200 (batch 1 worst).
# 10 iters stabilizes throughput/latency means used in CI comparison.
NUM_TIMED_ITERS: 10
BATCH_SIZES:
  - 1
  - 8
  - 32
  - 128
TOLERANCE_PCT: 10
# p99 omitted on purpose: with few timed iters it is not a reliable percentile,
# so it produces flaky regressions even when throughput / avg / p50 are stable.
METRICS:
  - throughput_tok_per_sec
  - avg_latency_ms
  - p50_latency_ms
  - tpot_ms_per_tok
